name: PR Comment

on:
  workflow_run:
    workflows: ["PR Check"]
    types: [completed]

# Write token is safe here — this workflow always runs on base-branch code,
# never on untrusted fork code.
permissions:
  contents: read
  pull-requests: write

jobs:
  post-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-check-results
          path: /tmp/pr-check
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const prNumber = parseInt(fs.readFileSync('/tmp/pr-check/pr_number.txt', 'utf8').trim(), 10);
            const exitCode = fs.readFileSync('/tmp/pr-check/exit_code.txt', 'utf8').trim();
            let output = '';
            try {
              output = fs.readFileSync('/tmp/pr-check/app_output.txt', 'utf8');
            } catch (e) {
              output = 'Failed to read application output';
            }

            let statusEmoji = '💹';
            let statusMessage = 'Application ran successfully with default settings';
            let comment = '';

            if (exitCode !== '0') {
              statusEmoji = '❌';
              statusMessage = 'Application failed to run';
            }
            comment = `${statusEmoji} **PR Check Results**\n\n${statusMessage}\n\n<details>\n<summary>Click to expand output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
