name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-calculator:
    runs-on: ubuntu-latest
    # No write permissions — untrusted code from forks runs here.
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build application
        run: dotnet build --configuration Release

      - name: Run application
        id: run-app
        run: |
          # Run the application with default settings and capture output
          set +e
          OUTPUT=$(dotnet run --configuration Release 2>&1)
          EXIT_CODE=$?
          set -e

          # Write job summary
          echo "# PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY

          # Save outputs for the post-comment job
          mkdir -p /tmp/pr-check
          echo "$OUTPUT" > /tmp/pr-check/app_output.txt
          echo "$EXIT_CODE" > /tmp/pr-check/exit_code.txt

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-check-results
          path: /tmp/pr-check/
          retention-days: 1 # we don't need to keep these very long at all.

  post-comment:
    runs-on: ubuntu-latest
    needs: run-calculator
    if: always()
    # Write token is safe here — no fork code runs in this job.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download results artifact
        uses: actions/download-artifact@v8
        with:
          name: pr-check-results
          path: /tmp/pr-check

      - name: Post results to PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            // PR number comes directly from the event context — no file needed.
            const prNumber = parseInt('${{ github.event.pull_request.number }}', 10);
            const exitCode = fs.readFileSync('/tmp/pr-check/exit_code.txt', 'utf8').trim();
            let output = '';
            try {
              output = fs.readFileSync('/tmp/pr-check/app_output.txt', 'utf8');
            } catch (e) {
              output = 'Failed to read application output';
            }

            let statusEmoji = '💹';
            let statusMessage = 'Application ran successfully with default settings';
            let comment = '';

            if (exitCode !== '0') {
              statusEmoji = '❌';
              statusMessage = 'Application failed to run';
              // Use code block for failed output
              comment = `${statusEmoji} **PR Check Results**\n\n${statusMessage}\n\n<details>\n<summary>Click to expand output</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;
            } else {
              // Use markdown output directly for successful runs (wrapped in details)
              comment = `${statusEmoji} **PR Check Results**\n\n${statusMessage}\n\n<details>\n<summary>Click to expand output</summary>\n\n${output}\n\n</details>`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });
