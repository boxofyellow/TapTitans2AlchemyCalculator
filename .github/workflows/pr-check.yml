name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

# No write permissions — untrusted code from forks runs here.
permissions:
  contents: read

jobs:
  run-calculator:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build application
        run: dotnet build --configuration Release

      - name: Run application
        id: run-app
        run: |
          # Run the application with default settings and capture output
          set +e
          OUTPUT=$(dotnet run --configuration Release 2>&1)
          EXIT_CODE=$?
          set -e

          # Write job summary
          echo "# PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY

          # Save outputs for the pr-comment workflow
          mkdir -p /tmp/pr-check
          echo "$OUTPUT" > /tmp/pr-check/app_output.txt
          echo "$EXIT_CODE" > /tmp/pr-check/exit_code.txt
          # PR number is safe to read from the event — it is not attacker-controlled content
          echo "${{ github.event.pull_request.number }}" > /tmp/pr-check/pr_number.txt

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-check-results
          path: /tmp/pr-check/
