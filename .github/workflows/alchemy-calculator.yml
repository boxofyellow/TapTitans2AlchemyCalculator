name: Alchemy Calculator

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  notify-start:
    runs-on: ubuntu-latest
    # Write permissions are safe here — no user-controlled code runs in this job.
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: contains(github.event.issue.labels.*.name, 'alchemy-calculator')
    outputs:
      reaction_target: ${{ steps.react-and-notify.outputs.reaction_target }}

    steps:
      - name: React and notify workflow start
        id: react-and-notify
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const isIssueComment = context.eventName === 'issue_comment';

            let reactionTarget = {};

            if (isIssueComment) {
              reactionTarget = { comment_id: context.payload.comment.id };
            } else {
              // For issue opened/edited events, find the last comment (if any) to react to
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              if (comments.data.length > 0) {
                reactionTarget = { comment_id: comments.data[comments.data.length - 1].id };
              } else {
                reactionTarget = { issue_number: context.issue.number };
              }
            }

            // Add eyes reaction to the triggering comment/issue
            if (reactionTarget.comment_id) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: reactionTarget.comment_id,
                content: 'eyes'
              });
            } else {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: reactionTarget.issue_number,
                content: 'eyes'
              });
            }

            // Post "workflow started" comment with link to the run
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔄 Alchemy Calculator workflow started! [View run](${runUrl})`
            });

            // reaction_target contains only integer IDs set by GitHub — no injection risk
            core.setOutput('reaction_target', JSON.stringify(reactionTarget));

  run-calculator:
    runs-on: ubuntu-latest
    needs: notify-start
    # No write permissions — potentially untrusted code (e.g., from a fork PR head) runs here.
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      exit_code: ${{ steps.run-app.outputs.exit_code }}
      has_targeted_reward: ${{ steps.get-input.outputs.has_targeted_reward }}
      has_inventory: ${{ steps.get-input.outputs.has_inventory }}

    steps:
      - name: Determine input source
        id: get-input
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const isPR = !!context.payload.issue?.pull_request;
            const isIssueComment = context.eventName === 'issue_comment';
            // reaction_target contains only integer IDs set by GitHub — no injection risk
            const reactionTarget = JSON.parse('${{ needs.notify-start.outputs.reaction_target }}' || '{}');

            let inputBody = '';

            if (isIssueComment) {
              // For issue_comment events, use the comment body from the event payload
              inputBody = context.payload.comment.body;
            } else if (reactionTarget.comment_id) {
              // Fetch the specific comment identified by notify-start
              const comment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: reactionTarget.comment_id
              });
              inputBody = comment.data.body;
            } else {
              // Use the issue body
              inputBody = context.payload.issue.body || '';
            }

            // Parse targeted reward - handle both form format and markdown format
            // Form format: ### Targeted Reward\n\nValue
            // Markdown format: ## Targeted Reward\nValue
            let targetedReward = '';
            const rewardMatch = inputBody.match(/###?\s*Targeted Reward\s*\n+([^\n#]+)/i);
            if (rewardMatch) {
              targetedReward = rewardMatch[1].trim();
            }

            // Parse inventory data - handle CSV format
            // Look for content after "Inventory Data" header
            let inventoryData = '';
            const inventoryMatch = inputBody.match(/###?\s*Inventory Data\s*\n+([\s\S]*?)(?=\n###|$)/i);
            if (inventoryMatch) {
              // Extract CSV content directly
              const csvContent = inventoryMatch[1].trim();
              const lines = csvContent.split('\n');
              const csvLines = [];

              for (const line of lines) {
                const trimmedLine = line.trim();
                // Check if line is a valid CSV line (contains comma and has values)
                if (trimmedLine && trimmedLine.includes(',')) {
                  csvLines.push(trimmedLine);
                }
              }

              if (csvLines.length > 0) {
                inventoryData = csvLines.join('\n');
              }
            }

            // Parse branch/sha from the input body (issue body or last comment)
            // Form format: ### Branch/SHA (Optional)\n\nValue
            // Markdown format: ## Branch/SHA (Optional)\nValue
            let branchSha = '';
            const branchMatch = inputBody.match(/###?\s*Branch\/SHA\s*\(Optional\)\s*\n+([^\n#]+)/i);
            if (branchMatch) {
              branchSha = branchMatch[1].trim();
            }

            // Check for valid branch/sha value
            // GitHub forms use '_No response_' for empty optional fields
            const isEmptyResponse = !branchSha || branchSha.startsWith('_') || branchSha === '';

            if (!isEmptyResponse) {
              console.log(`Branch/SHA specified: ${branchSha}`);
              core.setOutput('branch_sha', branchSha);
            } else {
              console.log('No branch/SHA specified, will use default branch');
              core.setOutput('branch_sha', '');
            }

            // Store values for later steps - write to files to avoid shell escaping issues
            fs.writeFileSync('/tmp/targeted_reward.txt', targetedReward);
            core.setOutput('has_targeted_reward', targetedReward.length > 0 ? 'true' : 'false');
            core.setOutput('is_pr', isPR ? 'true' : 'false');
            core.setOutput('is_comment', isIssueComment ? 'true' : 'false');

            // Write inventory data to a file to avoid shell escaping issues
            fs.writeFileSync('/tmp/inventory_data.txt', inventoryData);
            core.setOutput('has_inventory', inventoryData.length > 0 ? 'true' : 'false');

      - name: Determine checkout ref
        id: checkout-ref
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const isPR = '${{ steps.get-input.outputs.is_pr }}' === 'true';
            const branchSha = '${{ steps.get-input.outputs.branch_sha }}';

            if (isPR) {
              // For PRs, get the PR details to find the head SHA
              // Using SHA instead of ref name to support cross-fork PRs
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              const headSha = pr.data.head.sha;
              console.log(`PR detected, using head SHA: ${headSha}`);
              core.setOutput('ref', headSha);
              return;
            }

            // For issues, use the branch/sha from the input if specified
            if (branchSha) {
              console.log(`Using branch/SHA from input: ${branchSha}`);
              core.setOutput('ref', branchSha);
            } else {
              console.log('No branch/SHA specified, using default branch');
              core.setOutput('ref', '');
            }

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.checkout-ref.outputs.ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Fail if missing inputs (for non-PR issues)
        if: steps.get-input.outputs.is_pr != 'true' && (steps.get-input.outputs.has_targeted_reward != 'true' || steps.get-input.outputs.has_inventory != 'true')
        run: |
          echo "Missing required inputs: has_targeted_reward=${{ steps.get-input.outputs.has_targeted_reward }}, has_inventory=${{ steps.get-input.outputs.has_inventory }}"
          exit 1

      - name: Prepare inventory data
        run: |
          if [ -s /tmp/inventory_data.txt ]; then
            cp /tmp/inventory_data.txt inventoryData.csv
            echo "Using provided inventory data:"
          else
            echo "Using default inventory data:"
          fi
          cat inventoryData.csv

      - name: Build application
        run: dotnet build --configuration Release

      - name: Run application
        id: run-app
        run: |
          # Read targeted reward from file (safer than shell interpolation)
          if [ -s /tmp/targeted_reward.txt ]; then
            TARGETED_REWARD=$(cat /tmp/targeted_reward.txt)
          else
            TARGETED_REWARD="Wildcards"
          fi

          echo "Running with targeted reward: $TARGETED_REWARD"

          # Run the application and capture output
          set +e
          OUTPUT=$(dotnet run --configuration Release -- "$TARGETED_REWARD" 2>&1)
          EXIT_CODE=$?
          set -e

          # Save output to file for later use
          echo "$OUTPUT" > /tmp/app_output.txt

          # Write job summary
          echo "# Alchemy Calculator Results" >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY

          # Set output for next step
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Save outputs for post-comment job
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');

            fs.mkdirSync('/tmp/calculator-results', { recursive: true });

            let appOutput = '';
            try {
              appOutput = fs.readFileSync('/tmp/app_output.txt', 'utf8');
            } catch (e) {
              console.log('Warning: could not read app output:', e.message);
            }
            fs.writeFileSync('/tmp/calculator-results/app_output.txt', appOutput);

            // exit_code, reaction_target, has_targeted_reward, and has_inventory are passed
            // via job outputs (needs.*.outputs.*) — no need to save them as artifact files.

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: calculator-results
          path: /tmp/calculator-results/
          retention-days: 1 # we don't need to keep these very long at all.

  post-comment:
    runs-on: ubuntu-latest
    needs: [notify-start, run-calculator]
    if: always() && contains(github.event.issue.labels.*.name, 'alchemy-calculator')
    # Write token is safe here — no user-controlled code runs in this job.
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Download results artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: calculator-results
          path: /tmp/calculator-results

      - name: Post results
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          REACTION_TARGET: ${{ needs.notify-start.outputs.reaction_target }}
        with:
          script: |
            const fs = require('fs');

            // Read from job outputs — no artifact files needed for these
            // Fall back to '1' (failure) if run-app was skipped (output will be empty string)
            const exitCodeRaw = '${{ needs.run-calculator.outputs.exit_code }}';
            const exitCode = exitCodeRaw !== '' ? exitCodeRaw : '1';
            // reaction_target contains only integer IDs set by GitHub — no injection risk
            const reactionTarget = JSON.parse(process.env.REACTION_TARGET || '{}');
            const hasTargetedReward = '${{ needs.run-calculator.outputs.has_targeted_reward }}';
            const hasInventory = '${{ needs.run-calculator.outputs.has_inventory }}';

            // Recompute these from context — no need to save as artifact files
            const isPR = !!context.payload.issue?.pull_request;
            const issueNumber = context.issue.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // app_output is still read from artifact (raw multiline app output)
            let output = '';
            try {
              output = fs.readFileSync('/tmp/calculator-results/app_output.txt', 'utf8');
            } catch (e) {
              output = 'Failed to read application output';
            }

            // Check for missing inputs (non-PR issues only)
            if (!isPR && (hasTargetedReward !== 'true' || hasInventory !== 'true')) {
              let missingInputs = [];
              if (hasTargetedReward !== 'true') {
                missingInputs.push('**Targeted Reward**');
              }
              if (hasInventory !== 'true') {
                missingInputs.push('**Inventory Data**');
              }

              const helpMessage = `❌ Missing required inputs: ${missingInputs.join(', ')}

              Please provide the following in your issue body or a comment:

              ## Targeted Reward
              Wildcards

              ## Inventory Data
              Ingredient,Quantity
              Poison,0
              Tooth,0
              Steel,0
              Power,0
              Spirit,0
              Feather,0
              Egg,0
              Mushroom,0
              Pepper,0
              Sand,0
              Lightning,0
              Beetle,0
              Flame,0
              Scale,0
              Essence,0
              Shadow,0

              Valid rewards include: Currency, Wildcards, Skill Points, Raid Cards, Pet Eggs, Hero Weapons, Crafting Shards, Perks, Fortune Weapons, Clan Scroll, Fortune Scroll, and various equipment types.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: helpMessage
              });

              // Add confused reaction
              if (reactionTarget.comment_id) {
                await github.rest.reactions.createForIssueComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: reactionTarget.comment_id,
                  content: 'confused'
                });
              } else if (reactionTarget.issue_number) {
                await github.rest.reactions.createForIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: reactionTarget.issue_number,
                  content: 'confused'
                });
              }
              return;
            }

            let resultEmoji = '+1';  // success indicator
            let statusMessage = '✅ Calculation completed successfully!';
            let comment = '';

            if (exitCode !== '0') {
              resultEmoji = 'confused';
              statusMessage = '❌ Calculation failed!';
              // Use code block for failed output
              comment = `${statusMessage}\n\n[View run](${runUrl})\n\n\`\`\`\n${output}\n\`\`\``;
            } else {
              // Use markdown output directly for successful runs
              comment = `${statusMessage}\n\n[View run](${runUrl})\n\n${output}`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Add result reaction
            if (reactionTarget.comment_id) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: reactionTarget.comment_id,
                content: resultEmoji
              });
            } else if (reactionTarget.issue_number) {
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: reactionTarget.issue_number,
                content: resultEmoji
              });
            }
